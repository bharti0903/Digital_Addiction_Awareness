<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tracker Settings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 550px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 16px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 18px;
      cursor: pointer;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
    }

    .msg {
      margin-top: 12px;
      font-weight: 600;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>
  <h2>Digital Addiction Awareness Tracker</h2>

  <label for="backendUrl">Backend URL</label>
  <input id="backendUrl" placeholder="http://localhost:5002" />

  <label for="extensionToken">Extension Token</label>
  <input id="extensionToken" placeholder="Paste token from website" />

  <button id="saveBtn" type="button">Save</button>
  <p id="msg" class="msg"></p>

  <script src="options.js"></script>
</body>
</html>
